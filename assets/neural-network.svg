<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 300" width="800" height="300">
  <defs>
    <radialGradient id="bg" cx="50%" cy="50%" r="70%">
      <stop offset="0%" stop-color="#1a1040"/>
      <stop offset="100%" stop-color="#0a0a1a"/>
    </radialGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="2" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>
  <rect width="800" height="300" fill="url(#bg)"/>

  <!-- stars -->
  <g fill="white" opacity="0.4">
    <circle cx="50" cy="30" r="0.8"/><circle cx="120" cy="80" r="0.5"/><circle cx="200" cy="20" r="0.7"/>
    <circle cx="300" cy="60" r="0.6"/><circle cx="380" cy="15" r="0.9"/><circle cx="450" cy="45" r="0.5"/>
    <circle cx="520" cy="25" r="0.7"/><circle cx="600" cy="70" r="0.6"/><circle cx="680" cy="35" r="0.8"/>
    <circle cx="750" cy="55" r="0.5"/><circle cx="90" cy="250" r="0.6"/><circle cx="170" cy="280" r="0.7"/>
    <circle cx="350" cy="270" r="0.5"/><circle cx="500" cy="260" r="0.8"/><circle cx="650" cy="285" r="0.6"/>
    <circle cx="720" cy="240" r="0.7"/><circle cx="30" cy="150" r="0.5"/><circle cx="770" cy="150" r="0.6"/>
  </g>

  <!-- twinkling stars -->
  <g filter="url(#glow)">
    <circle cx="100" cy="50" r="1.2" fill="#667eea">
      <animate attributeName="opacity" values="0.2;1;0.2" dur="3s" repeatCount="indefinite"/>
    </circle>
    <circle cx="250" cy="90" r="1" fill="#a78bfa">
      <animate attributeName="opacity" values="0.8;0.2;0.8" dur="2.5s" repeatCount="indefinite"/>
    </circle>
    <circle cx="400" cy="40" r="1.5" fill="#667eea">
      <animate attributeName="opacity" values="0.3;1;0.3" dur="4s" repeatCount="indefinite"/>
    </circle>
    <circle cx="550" cy="75" r="1" fill="#c084fc">
      <animate attributeName="opacity" values="0.6;0.1;0.6" dur="2s" repeatCount="indefinite"/>
    </circle>
    <circle cx="700" cy="50" r="1.3" fill="#764ba2">
      <animate attributeName="opacity" values="0.2;0.9;0.2" dur="3.5s" repeatCount="indefinite"/>
    </circle>
  </g>

  <!-- network nodes -->
  <g filter="url(#glow)">
    <!-- node positions -->
    <circle cx="150" cy="120" r="3" fill="#667eea" opacity="0.9">
      <animate attributeName="cy" values="120;115;120" dur="5s" repeatCount="indefinite"/>
    </circle>
    <circle cx="250" cy="180" r="2.5" fill="#a78bfa" opacity="0.8">
      <animate attributeName="cy" values="180;185;180" dur="4s" repeatCount="indefinite"/>
    </circle>
    <circle cx="350" cy="140" r="3.5" fill="#764ba2" opacity="0.9">
      <animate attributeName="cy" values="140;135;140" dur="6s" repeatCount="indefinite"/>
    </circle>
    <circle cx="450" cy="190" r="2" fill="#667eea" opacity="0.7">
      <animate attributeName="cy" values="190;195;190" dur="3.5s" repeatCount="indefinite"/>
    </circle>
    <circle cx="550" cy="130" r="3" fill="#c084fc" opacity="0.9">
      <animate attributeName="cy" values="130;125;130" dur="5.5s" repeatCount="indefinite"/>
    </circle>
    <circle cx="650" cy="170" r="2.5" fill="#764ba2" opacity="0.8">
      <animate attributeName="cy" values="170;175;170" dur="4.5s" repeatCount="indefinite"/>
    </circle>
    <circle cx="200" cy="220" r="2" fill="#c084fc" opacity="0.7">
      <animate attributeName="cy" values="220;225;220" dur="3s" repeatCount="indefinite"/>
    </circle>
    <circle cx="400" cy="100" r="2.5" fill="#a78bfa" opacity="0.8">
      <animate attributeName="cy" values="100;95;100" dur="4s" repeatCount="indefinite"/>
    </circle>
    <circle cx="500" cy="230" r="2" fill="#667eea" opacity="0.7">
      <animate attributeName="cy" values="230;235;230" dur="5s" repeatCount="indefinite"/>
    </circle>
    <circle cx="600" cy="110" r="3" fill="#a78bfa" opacity="0.9">
      <animate attributeName="cy" values="110;105;110" dur="3.5s" repeatCount="indefinite"/>
    </circle>
    <circle cx="300" cy="250" r="2" fill="#764ba2" opacity="0.7">
      <animate attributeName="cy" values="250;255;250" dur="4.5s" repeatCount="indefinite"/>
    </circle>
    <circle cx="700" cy="220" r="2.5" fill="#667eea" opacity="0.8">
      <animate attributeName="cy" values="220;215;220" dur="5s" repeatCount="indefinite"/>
    </circle>
    <circle cx="100" cy="200" r="2" fill="#a78bfa" opacity="0.7">
      <animate attributeName="cy" values="200;205;200" dur="3s" repeatCount="indefinite"/>
    </circle>
  </g>

  <!-- network lines -->
  <g stroke-width="0.5" opacity="0.25">
    <line x1="150" y1="120" x2="250" y2="180" stroke="url(#lineGrad1)">
      <animate attributeName="opacity" values="0.15;0.35;0.15" dur="4s" repeatCount="indefinite"/>
    </line>
    <line x1="250" y1="180" x2="350" y2="140" stroke="#a78bfa">
      <animate attributeName="opacity" values="0.25;0.1;0.25" dur="3s" repeatCount="indefinite"/>
    </line>
    <line x1="350" y1="140" x2="450" y2="190" stroke="#764ba2">
      <animate attributeName="opacity" values="0.1;0.3;0.1" dur="5s" repeatCount="indefinite"/>
    </line>
    <line x1="450" y1="190" x2="550" y2="130" stroke="#667eea">
      <animate attributeName="opacity" values="0.2;0.4;0.2" dur="3.5s" repeatCount="indefinite"/>
    </line>
    <line x1="550" y1="130" x2="650" y2="170" stroke="#c084fc">
      <animate attributeName="opacity" values="0.15;0.35;0.15" dur="4.5s" repeatCount="indefinite"/>
    </line>
    <line x1="150" y1="120" x2="350" y2="140" stroke="#667eea">
      <animate attributeName="opacity" values="0.1;0.25;0.1" dur="6s" repeatCount="indefinite"/>
    </line>
    <line x1="250" y1="180" x2="450" y2="190" stroke="#a78bfa">
      <animate attributeName="opacity" values="0.2;0.1;0.2" dur="3s" repeatCount="indefinite"/>
    </line>
    <line x1="350" y1="140" x2="550" y2="130" stroke="#764ba2">
      <animate attributeName="opacity" values="0.1;0.3;0.1" dur="5s" repeatCount="indefinite"/>
    </line>
    <line x1="450" y1="190" x2="650" y2="170" stroke="#667eea">
      <animate attributeName="opacity" values="0.25;0.1;0.25" dur="4s" repeatCount="indefinite"/>
    </line>
    <line x1="200" y1="220" x2="350" y2="140" stroke="#c084fc">
      <animate attributeName="opacity" values="0.1;0.2;0.1" dur="5.5s" repeatCount="indefinite"/>
    </line>
    <line x1="400" y1="100" x2="550" y2="130" stroke="#a78bfa">
      <animate attributeName="opacity" values="0.2;0.35;0.2" dur="3.5s" repeatCount="indefinite"/>
    </line>
    <line x1="400" y1="100" x2="350" y2="140" stroke="#667eea">
      <animate attributeName="opacity" values="0.15;0.3;0.15" dur="4s" repeatCount="indefinite"/>
    </line>
    <line x1="500" y1="230" x2="450" y2="190" stroke="#764ba2">
      <animate attributeName="opacity" values="0.1;0.25;0.1" dur="3s" repeatCount="indefinite"/>
    </line>
    <line x1="500" y1="230" x2="650" y2="170" stroke="#a78bfa">
      <animate attributeName="opacity" values="0.2;0.1;0.2" dur="5s" repeatCount="indefinite"/>
    </line>
    <line x1="600" y1="110" x2="550" y2="130" stroke="#c084fc">
      <animate attributeName="opacity" values="0.15;0.3;0.15" dur="4.5s" repeatCount="indefinite"/>
    </line>
    <line x1="600" y1="110" x2="650" y2="170" stroke="#667eea">
      <animate attributeName="opacity" values="0.1;0.25;0.1" dur="3s" repeatCount="indefinite"/>
    </line>
    <line x1="100" y1="200" x2="150" y2="120" stroke="#a78bfa">
      <animate attributeName="opacity" values="0.2;0.35;0.2" dur="4s" repeatCount="indefinite"/>
    </line>
    <line x1="100" y1="200" x2="200" y2="220" stroke="#764ba2">
      <animate attributeName="opacity" values="0.1;0.2;0.1" dur="5s" repeatCount="indefinite"/>
    </line>
    <line x1="300" y1="250" x2="250" y2="180" stroke="#667eea">
      <animate attributeName="opacity" values="0.15;0.3;0.15" dur="3.5s" repeatCount="indefinite"/>
    </line>
    <line x1="300" y1="250" x2="500" y2="230" stroke="#c084fc">
      <animate attributeName="opacity" values="0.1;0.25;0.1" dur="4.5s" repeatCount="indefinite"/>
    </line>
    <line x1="700" y1="220" x2="650" y2="170" stroke="#a78bfa">
      <animate attributeName="opacity" values="0.2;0.1;0.2" dur="3s" repeatCount="indefinite"/>
    </line>
    <line x1="700" y1="220" x2="600" y2="110" stroke="#764ba2">
      <animate attributeName="opacity" values="0.1;0.3;0.1" dur="5.5s" repeatCount="indefinite"/>
    </line>
  </g>

  <!-- floating geometric shapes -->
  <g opacity="0.15" fill="none" stroke-width="0.8">
    <!-- triangle -->
    <polygon points="380,80 420,150 340,150" stroke="#667eea">
      <animateTransform attributeName="transform" type="rotate" values="0 380 120;360 380 120" dur="30s" repeatCount="indefinite"/>
      <animate attributeName="opacity" values="0.1;0.2;0.1" dur="8s" repeatCount="indefinite"/>
    </polygon>
    <!-- hexagon -->
    <polygon points="580,160 600,145 620,160 620,180 600,195 580,180" stroke="#a78bfa">
      <animateTransform attributeName="transform" type="rotate" values="360 600 170;0 600 170" dur="25s" repeatCount="indefinite"/>
      <animate attributeName="opacity" values="0.15;0.25;0.15" dur="6s" repeatCount="indefinite"/>
    </polygon>
    <!-- diamond -->
    <polygon points="180,160 200,140 220,160 200,180" stroke="#c084fc">
      <animateTransform attributeName="transform" type="rotate" values="0 200 160;360 200 160" dur="20s" repeatCount="indefinite"/>
      <animate attributeName="opacity" values="0.1;0.2;0.1" dur="7s" repeatCount="indefinite"/>
    </polygon>
  </g>

  <!-- center text -->
  <text x="400" y="145" text-anchor="middle" font-family="SF Pro Display, -apple-system, Helvetica Neue, sans-serif" font-size="14" font-weight="300" fill="white" opacity="0.5" letter-spacing="8">
    NEURAL NETWORK
  </text>
  <text x="400" y="168" text-anchor="middle" font-family="SF Pro Display, -apple-system, Helvetica Neue, sans-serif" font-size="10" fill="#a78bfa" opacity="0.4" letter-spacing="4">
    CONTRIBUTION TOPOLOGY
  </text>
</svg>
