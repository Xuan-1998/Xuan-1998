<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 280" width="800" height="280">
<style>
  @keyframes twinkle1 { 0%,100%{opacity:.15} 50%{opacity:.8} }
  @keyframes twinkle2 { 0%,100%{opacity:.6} 50%{opacity:.1} }
  @keyframes twinkle3 { 0%,100%{opacity:.3} 50%{opacity:.9} }
  @keyframes drift1 { 0%,100%{transform:translateY(0)} 50%{transform:translateY(-6px)} }
  @keyframes drift2 { 0%,100%{transform:translateY(0)} 50%{transform:translateY(5px)} }
  @keyframes drift3 { 0%,100%{transform:translateY(0)} 50%{transform:translateY(-4px)} }
  @keyframes pulse { 0%,100%{opacity:.12} 50%{opacity:.3} }
  @keyframes rotate1 { from{transform:rotate(0deg)} to{transform:rotate(360deg)} }
  @keyframes rotate2 { from{transform:rotate(360deg)} to{transform:rotate(0deg)} }
  @keyframes fadeline { 0%,100%{opacity:.06} 50%{opacity:.2} }
  .s1{animation:twinkle1 3s ease-in-out infinite}
  .s2{animation:twinkle2 2.5s ease-in-out infinite}
  .s3{animation:twinkle3 4s ease-in-out infinite}
  .n1{animation:drift1 6s ease-in-out infinite}
  .n2{animation:drift2 5s ease-in-out infinite}
  .n3{animation:drift3 7s ease-in-out infinite}
  .ln{animation:fadeline 4s ease-in-out infinite}
  .geo1{animation:rotate1 40s linear infinite;transform-origin:380px 130px}
  .geo2{animation:rotate2 35s linear infinite;transform-origin:600px 160px}
  .geo3{animation:rotate1 50s linear infinite;transform-origin:180px 170px}
</style>
<defs>
  <radialGradient id="bg" cx="50%" cy="40%" r="70%">
    <stop offset="0%" stop-color="#1a1040"/>
    <stop offset="100%" stop-color="#08080f"/>
  </radialGradient>
  <radialGradient id="glow1" cx="50%" cy="50%" r="50%">
    <stop offset="0%" stop-color="#667eea" stop-opacity="0.15"/>
    <stop offset="100%" stop-color="#667eea" stop-opacity="0"/>
  </radialGradient>
  <radialGradient id="glow2" cx="50%" cy="50%" r="50%">
    <stop offset="0%" stop-color="#764ba2" stop-opacity="0.12"/>
    <stop offset="100%" stop-color="#764ba2" stop-opacity="0"/>
  </radialGradient>
</defs>
<rect width="800" height="280" fill="url(#bg)"/>

<!-- ambient glows -->
<circle cx="250" cy="120" r="120" fill="url(#glow1)"/>
<circle cx="580" cy="150" r="140" fill="url(#glow2)"/>

<!-- tiny stars -->
<g fill="#fff">
  <circle cx="45" cy="22" r=".6" class="s1"/><circle cx="112" cy="68" r=".4" class="s2"/>
  <circle cx="198" cy="18" r=".5" class="s3"/><circle cx="287" cy="52" r=".7" class="s1"/>
  <circle cx="365" cy="12" r=".5" class="s2"/><circle cx="442" cy="38" r=".6" class="s3"/>
  <circle cx="518" cy="22" r=".4" class="s1"/><circle cx="595" cy="58" r=".7" class="s2"/>
  <circle cx="672" cy="28" r=".5" class="s3"/><circle cx="748" cy="48" r=".6" class="s1"/>
  <circle cx="82" cy="245" r=".5" class="s2"/><circle cx="168" cy="268" r=".4" class="s3"/>
  <circle cx="338" cy="258" r=".6" class="s1"/><circle cx="488" cy="248" r=".5" class="s2"/>
  <circle cx="638" cy="272" r=".7" class="s3"/><circle cx="715" cy="235" r=".4" class="s1"/>
  <circle cx="28" cy="140" r=".5" class="s2"/><circle cx="772" cy="145" r=".6" class="s3"/>
  <circle cx="60" cy="180" r=".3" class="s1"/><circle cx="740" cy="90" r=".4" class="s2"/>
  <circle cx="420" cy="265" r=".5" class="s3"/><circle cx="560" cy="15" r=".3" class="s1"/>
</g>

<!-- network lines -->
<g stroke-width=".6" fill="none">
  <line x1="140" y1="110" x2="240" y2="170" stroke="#667eea" class="ln"/>
  <line x1="240" y1="170" x2="340" y2="130" stroke="#a78bfa" class="ln" style="animation-delay:.5s"/>
  <line x1="340" y1="130" x2="440" y2="180" stroke="#764ba2" class="ln" style="animation-delay:1s"/>
  <line x1="440" y1="180" x2="540" y2="120" stroke="#667eea" class="ln" style="animation-delay:1.5s"/>
  <line x1="540" y1="120" x2="650" y2="160" stroke="#c084fc" class="ln" style="animation-delay:2s"/>
  <line x1="140" y1="110" x2="340" y2="130" stroke="#667eea" class="ln" style="animation-delay:.8s"/>
  <line x1="240" y1="170" x2="440" y2="180" stroke="#a78bfa" class="ln" style="animation-delay:1.3s"/>
  <line x1="340" y1="130" x2="540" y2="120" stroke="#764ba2" class="ln" style="animation-delay:1.8s"/>
  <line x1="440" y1="180" x2="650" y2="160" stroke="#667eea" class="ln" style="animation-delay:2.3s"/>
  <line x1="190" y1="210" x2="340" y2="130" stroke="#c084fc" class="ln" style="animation-delay:.3s"/>
  <line x1="390" y1="90" x2="540" y2="120" stroke="#a78bfa" class="ln" style="animation-delay:1.1s"/>
  <line x1="390" y1="90" x2="340" y2="130" stroke="#667eea" class="ln" style="animation-delay:.6s"/>
  <line x1="490" y1="220" x2="440" y2="180" stroke="#764ba2" class="ln" style="animation-delay:1.6s"/>
  <line x1="490" y1="220" x2="650" y2="160" stroke="#a78bfa" class="ln" style="animation-delay:2.1s"/>
  <line x1="590" y1="100" x2="540" y2="120" stroke="#c084fc" class="ln" style="animation-delay:.9s"/>
  <line x1="590" y1="100" x2="650" y2="160" stroke="#667eea" class="ln" style="animation-delay:1.4s"/>
  <line x1="95" y1="190" x2="140" y2="110" stroke="#a78bfa" class="ln" style="animation-delay:.4s"/>
  <line x1="95" y1="190" x2="190" y2="210" stroke="#764ba2" class="ln" style="animation-delay:.7s"/>
  <line x1="290" y1="240" x2="240" y2="170" stroke="#667eea" class="ln" style="animation-delay:1.2s"/>
  <line x1="290" y1="240" x2="490" y2="220" stroke="#c084fc" class="ln" style="animation-delay:1.7s"/>
  <line x1="700" y1="210" x2="650" y2="160" stroke="#a78bfa" class="ln" style="animation-delay:2.2s"/>
  <line x1="700" y1="210" x2="590" y2="100" stroke="#764ba2" class="ln" style="animation-delay:.2s"/>
</g>

<!-- network nodes -->
<g>
  <circle cx="140" cy="110" r="2.8" fill="#667eea" opacity=".85" class="n1"/>
  <circle cx="240" cy="170" r="2.2" fill="#a78bfa" opacity=".75" class="n2"/>
  <circle cx="340" cy="130" r="3.2" fill="#764ba2" opacity=".9" class="n3"/>
  <circle cx="440" cy="180" r="2" fill="#667eea" opacity=".7" class="n1" style="animation-delay:1s"/>
  <circle cx="540" cy="120" r="2.8" fill="#c084fc" opacity=".85" class="n2" style="animation-delay:.5s"/>
  <circle cx="650" cy="160" r="2.4" fill="#764ba2" opacity=".8" class="n3" style="animation-delay:1.5s"/>
  <circle cx="190" cy="210" r="1.8" fill="#c084fc" opacity=".65" class="n1" style="animation-delay:2s"/>
  <circle cx="390" cy="90" r="2.2" fill="#a78bfa" opacity=".75" class="n2" style="animation-delay:.8s"/>
  <circle cx="490" cy="220" r="1.8" fill="#667eea" opacity=".65" class="n3" style="animation-delay:1.2s"/>
  <circle cx="590" cy="100" r="2.6" fill="#a78bfa" opacity=".8" class="n1" style="animation-delay:1.8s"/>
  <circle cx="290" cy="240" r="1.8" fill="#764ba2" opacity=".65" class="n2" style="animation-delay:.3s"/>
  <circle cx="700" cy="210" r="2.2" fill="#667eea" opacity=".75" class="n3" style="animation-delay:2.5s"/>
  <circle cx="95" cy="190" r="1.8" fill="#a78bfa" opacity=".65" class="n1" style="animation-delay:1.3s"/>
</g>

<!-- geometric shapes -->
<g fill="none" stroke-width=".7" opacity=".12">
  <polygon points="350,100 410,130 410,170 350,200 290,170 290,130" stroke="#667eea" class="geo1"/>
  <polygon points="580,135 610,150 610,175 580,190 550,175 550,150" stroke="#a78bfa" class="geo2"/>
  <polygon points="165,145 195,165 180,200 150,200 135,165" stroke="#c084fc" class="geo3"/>
</g>
</svg>
